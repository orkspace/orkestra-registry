apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgreses.postgres.orkestra.io
spec:
  group: postgres.orkestra.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version:
                  type: string
                  default: "14"
                database:
                  type: string
                user:
                  type: string
  names:
    kind: Postgres
    plural: postgreses
    singular: postgres
  scope: Namespaced