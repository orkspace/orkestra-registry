apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: postgres
  version: v1.0.0
  description: >-
    A declarative PostgreSQL deployment pattern that provisions a single‑instance
    Postgres server using any CR image version. The pattern accepts any valid
    Postgres image tag through spec.version, defaults to 14, and exposes port 5432
    via a stable Service. Suitable for development, CI, and controlled production.
  author: orkspace
  license: Apache-2.0
  tags:
    - postgres
    - database
    - sql
    - stateful
    - persistent-storage
    - service
    - single-instance
    - development
    - ci
    - production-ready
    - storage
    - katalog

spec:
  crds:
    postgres:
      apiTypes:
        group: postgres.orkestra.io
        version: v1
        kind: Postgres
        plural: postgreses
      workers: 2
      resync: 1m
      imports:
        - motif: oci://ghcr.io/orkspace/orkestra-registry/patterns/motifs/postgres:v0.1.0
          with:
            image: 'postgres:{{ .spec.version | default "14" }}'
            replicas: '{{ .spec.replicas | default "1" }}'
            resourceProfile: '{{ .spec.resourceProfile | default "burst" }}'
            volumeSize: '{{ .spec.storageSize | default "10Gi" }}'
            storageClass: '{{ .spec.storageClass | default "standard" }}'
            database: '{{ .spec.database | default "app" }}'
            username: '{{ .spec.username | default "postgres" }}'
            enableUI: '{{ .spec.enableUI | default "true" }}'
