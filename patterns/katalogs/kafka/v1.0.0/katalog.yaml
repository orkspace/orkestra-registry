apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: kafka
  version: v1.0.0
  description: >-
    A declarative Apache Kafka deployment pattern that provisions a single‑broker
    Kafka cluster in KRaft mode (no Zookeeper dependency) using any CR image version.
    The pattern accepts any valid Apache Kafka image tag through spec.version and
    exposes port 9092 via a stable Service. Includes an optional Kafka UI management
    console. Suitable for event streaming, log aggregation, and real-time data pipelines.
  author: orkspace
  license: Apache-2.0
  tags:
    - kafka
    - messaging
    - streaming
    - stateful
    - persistent-storage
    - service
    - single-instance
    - kraft
    - distributed
    - development
    - ci
    - production-ready
    - storage
    - katalog

spec:
  crds:
    kafka:
      apiTypes:
        group: kafka.orkestra.io
        version: v1
        kind: Kafka
        plural: kafkas
      workers: 2
      resync: 1m
      imports:
        - motif: oci://ghcr.io/orkspace/orkestra-registry/patterns/motifs/kafka:v0.1.0
          with:
            image: 'apache/kafka:{{ .spec.version | default "latest" }}'
            replicas: '{{ .spec.replicas | default "1" }}'
            resourceProfile: '{{ .spec.resourceProfile | default "compute-heavy" }}'
            volumeSize: '{{ .spec.storageSize | default "20Gi" }}'
            storageClass: '{{ .spec.storageClass | default "standard" }}'
            enableUI: '{{ .spec.enableUI | default "true" }}'
