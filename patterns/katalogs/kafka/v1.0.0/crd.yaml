apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kafkas.kafka.orkestra.io
spec:
  group: kafka.orkestra.io
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version:
                  type: string
                  default: "latest"
                replicas:
                  type: integer
                  default: 1
                storageSize:
                  type: string
                  default: "20Gi"
                storageClass:
                  type: string
                  default: "standard"
                resourceProfile:
                  type: string
                  default: "compute-heavy"
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  names:
    kind: Kafka
    plural: kafkas
    singular: kafka
  scope: Namespaced
