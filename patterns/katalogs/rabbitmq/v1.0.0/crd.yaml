apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rabbitmqs.rabbitmq.orkestra.io
spec:
  group: rabbitmq.orkestra.io
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version:
                  type: string
                  default: "management"
                username:
                  type: string
                vhost:
                  type: string
                  default: "/"
                storageSize:
                  type: string
                  default: "5Gi"
                storageClass:
                  type: string
                  default: "standard"
                resourceProfile:
                  type: string
                  default: "small"
                replicas:
                  type: integer
                  default: 1
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  names:
    kind: RabbitMQ
    plural: rabbitmqs
    singular: rabbitmq
  scope: Namespaced
