apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mysqls.mysql.orkestra.io
spec:
  group: mysql.orkestra.io
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version:
                  type: string
                  default: "8"
                database:
                  type: string
                username:
                  type: string
                storageSize:
                  type: string
                  default: "10Gi"
                storageClass:
                  type: string
                  default: "standard"
                resourceProfile:
                  type: string
                  default: "standard"
                replicas:
                  type: integer
                  default: 1
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  names:
    kind: MySQL
    plural: mysqls
    singular: mysql
  scope: Namespaced
