apiVersion: orkestra.orkspace.io/v1
kind: E2E
metadata:
  name: mysql-e2e
  description: End-to-end test for the mysql katalog pattern
spec:
  cluster:
    name: ork-e2e-mysql
    provider: kind
    reuse: false
  katalog: ./katalog.yaml
  crd: ./crd.yaml
  cr: ./cr.yaml
  expect:
    - name: "CR created"
      after: cr-applied
      timeout: 30s
      resources:
        - kind: MySQL
          name: my-mysql
          namespace: default

    - name: "StatefulSet running"
      after: cr-applied
      timeout: 300s
      resources:
        - kind: StatefulSet
          name: my-mysql-mysql
          namespace: default
          ready: true

    - name: "Service exists"
      after: cr-applied
      timeout: 60s
      resources:
        - kind: Service
          name: my-mysql-mysql
          namespace: default

    - name: "CR deleted"
      after: cr-deleted
      timeout: 60s
      resources:
        - kind: MySQL
          name: my-mysql
          namespace: default
          count: 0

    - name: "StatefulSet removed"
      after: cr-deleted
      timeout: 90s
      resources:
        - kind: StatefulSet
          name: my-mysql-mysql
          namespace: default
          count: 0
