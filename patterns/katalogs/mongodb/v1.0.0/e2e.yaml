apiVersion: orkestra.orkspace.io/v1
kind: E2E
metadata:
  name: mongodb-e2e
  description: End-to-end test for the mongodb katalog pattern
spec:
  cluster:
    name: ork-e2e-mongodb
    provider: kind
    reuse: false
  katalog: ./katalog.yaml
  crd: ./crd.yaml
  cr: ./cr.yaml
  expect:
    - name: "CR created"
      after: cr-applied
      timeout: 30s
      resources:
        - kind: MongoDB
          name: my-mongodb
          namespace: default

    - name: "StatefulSet running"
      after: cr-applied
      timeout: 300s
      resources:
        - kind: StatefulSet
          name: my-mongodb-mongodb
          namespace: default
          ready: true

    - name: "Service exists"
      after: cr-applied
      timeout: 60s
      resources:
        - kind: Service
          name: my-mongodb-mongodb
          namespace: default

    - name: "CR deleted"
      after: cr-deleted
      timeout: 60s
      resources:
        - kind: MongoDB
          name: my-mongodb
          namespace: default
          count: 0

    - name: "StatefulSet removed"
      after: cr-deleted
      timeout: 90s
      resources:
        - kind: StatefulSet
          name: my-mongodb-mongodb
          namespace: default
          count: 0
