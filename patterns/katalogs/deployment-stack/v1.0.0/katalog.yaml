apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: deployment-stack
  version: v1.0.0
  description: >-
    A declarative application deployment pattern that provisions a full
    production-ready stack: ServiceAccount, Role, RoleBinding, Deployment,
    Service, HPA, PDB, and optional Ingress. Accepts any container image and
    port. Suitable for stateless web services, APIs, and background workers.
  author: orkspace
  license: Apache-2.0
  tags:
    - deployment
    - service
    - autoscaling
    - ingress
    - rbac
    - full-stack
    - application
    - stateless
    - production-ready
    - katalog

spec:
  crds:
    application:
      apiTypes:
        group: apps.orkestra.io
        version: v1
        kind: Application
        plural: applications
      workers: 2
      resync: 1m
      imports:
        - motif: oci://ghcr.io/orkspace/orkestra-registry/patterns/motifs/deployment-stack:v0.1.0
          with:
            name: '{{ .metadata.name }}'
            namespace: '{{ .metadata.namespace }}'
            image: '{{ .spec.image }}'
            port: '{{ .spec.port }}'
            replicas: '{{ .spec.replicas }}'
            maxReplicas: '{{ .spec.maxReplicas }}'
            resourceProfile: '{{ .spec.resourceProfile }}'
            ingressClass: '{{ .spec.ingressClass }}'
            host: '{{ .spec.host }}'
