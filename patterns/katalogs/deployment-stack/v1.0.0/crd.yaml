apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applications.apps.orkestra.io
spec:
  group: apps.orkestra.io
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Container image (e.g. nginx:latest)
                port:
                  type: integer
                  default: 8080
                  description: Container port the application listens on
                replicas:
                  type: integer
                  default: 2
                  description: Desired replica count
                maxReplicas:
                  type: integer
                  default: 10
                  description: Maximum replicas for HPA scale-out
                resourceProfile:
                  type: string
                  default: "burst"
                  description: Orkestra resource profile (burst, standard, optimized)
                ingressClass:
                  type: string
                  default: "nginx"
                  description: Ingress class name
                host:
                  type: string
                  default: ""
                  description: Public hostname for Ingress. Leave empty to skip Ingress creation.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
  names:
    kind: Application
    plural: applications
    singular: application
  scope: Namespaced
