apiVersion: orkestra.orkspace.io/v1
kind: Simulate
metadata:
  name: deployment-stack-sim
  description: Verify the full deployment stack — ServiceAccount, Role, Deployment, Service, HPA, PDB created in cycle 1

spec:
  katalog: ./katalog.yaml
  cr: ./cr.yaml
  cycles: 5

  expect:
    steady: true
    noErrors: true
    ops:
      - cycle: 1
        verb: create
        resource: serviceaccounts
        name: my-app-sa
      - cycle: 1
        verb: create
        resource: roles
        name: my-app-role
      - cycle: 1
        verb: create
        resource: rolebindings
        name: my-app-rolebinding
      - cycle: 1
        verb: create
        resource: deployments
        name: my-app
      - cycle: 1
        verb: create
        resource: services
        name: my-app-svc
      - cycle: 1
        verb: create
        resource: horizontalpodautoscalers
        name: my-app-hpa
      - cycle: 1
        verb: create
        resource: poddisruptionbudgets
        name: my-app-pdb
