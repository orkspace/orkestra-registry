apiVersion: orkestra.orkspace.io/v1
kind: Komposer
metadata:
  name: redis-example
  description: Example Komposer showing how to consume the redis pattern

imports:
  registry:
    - url: ghcr.io/orkspace/orkestra-registry/patterns/katalogs/redis@v1.0.0
      oci: true

spec:
  crds:
    # Production overrides — recommended for non-development environments
    redis:
      workers: 4        # default is 2 — increase for higher throughput
      resync: 30s       # default is 1m — reduce for faster drift detection
