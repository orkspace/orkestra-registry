apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: redis
  version: v1.0.0
  description: >-
    A declarative Redis deployment pattern that provisions a single‑instance
    Redis server using any CR image version. The pattern accepts any valid
    Redis image tag through spec.version, defaults to 7, and exposes port 6379
    via a stable Service. Includes an optional Redis Commander management UI.
    Suitable for caching, session storage, and pub/sub workloads.
  author: orkspace
  license: Apache-2.0
  tags:
    - redis
    - cache
    - key-value
    - stateful
    - persistent-storage
    - service
    - single-instance
    - development
    - ci
    - production-ready
    - storage
    - katalog

spec:
  crds:
    redis:
      apiTypes:
        group: redis.orkestra.io
        version: v1
        kind: Redis
        plural: redises
      workers: 2
      resync: 1m
      imports:
        - motif: oci://ghcr.io/orkspace/orkestra-registry/patterns/motifs/redis:v0.1.0
          with:
            image: 'redis:{{ .spec.version | default "7" }}'
            replicas: '{{ .spec.replicas | default "1" }}'
            resourceProfile: '{{ .spec.resourceProfile | default "burst" }}'
            volumeSize: '{{ .spec.storageSize | default "5Gi" }}'
            storageClass: '{{ .spec.storageClass | default "standard" }}'
            enableUI: '{{ .spec.enableUI | default "true" }}'
