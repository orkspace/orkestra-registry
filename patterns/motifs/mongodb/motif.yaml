apiVersion: orkestra.orkspace.io/v1
kind: Motif
metadata:
  name: mongodb
  version: v0.1.0
  description: >
    MongoDB StatefulSet with persistent storage, headless Service for pod DNS,
    client Service, and mongo-express management UI.
  author: orkspace
  license: Apache-2.0
  tags:
    - mongodb
    - database
    - nosql
    - statefulset
    - storage
    - ui
    - headless-service

inputs:
  - name: image
    description: MongoDB image
    default: "mongo:latest"

  - name: replicas
    description: Number of replicas
    default: "1"

  - name: resourceProfile
    description: CPU/memory profile (small, burst, standard, compute-heavy)
    default: "standard"

  - name: volumeSize
    description: PVC storage size for the data volume
    default: "10Gi"

  - name: storageClass
    description: StorageClass for dynamic PVC provisioning
    default: "standard"

  - name: database
    description: Default database name
    default: "app"

  - name: username
    description: MongoDB root username
    default: "admin"

  - name: mongoExpressImage
    description: mongo-express management UI image
    default: "mongo-express:latest"

  - name: enableUI
    description: Deploy the mongo-express management UI (true/false)
    default: "true"

resources:
  statefulSets:
    - name: "{{ .metadata.name }}-mongodb"
      image: "{{ .inputs.image }}"
      replicas: "{{ .inputs.replicas }}"
      serviceName: "{{ .metadata.name }}-mongodb-headless"
      port: 27017
      resources:
        profile: "{{ .inputs.resourceProfile }}"
      probes:
        startup:
          type: tcp
          profile: slow-start
        liveness:
          type: tcp
          profile: standard
        readiness:
          type: tcp
          profile: standard
      volumeClaimTemplates:
        - name: data
          storageClass: "{{ .inputs.storageClass }}"
          storageSize: "{{ .inputs.volumeSize }}"
          mountPath: /data/db
      env:
        - name: MONGO_INITDB_DATABASE
          value: "{{ .inputs.database }}"
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "{{ .inputs.username }}"

  services:
    - name: "{{ .metadata.name }}-mongodb-headless"
      headless: true
      port: 27017
      targetPort: 27017

    - name: "{{ .metadata.name }}-mongodb"
      port: 27017
      targetPort: 27017

    - name: "{{ .metadata.name }}-mongoexpress-svc"
      port: 8081
      targetPort: 8081
      type: LoadBalancer
      when:
        - field: inputs.enableUI
          equals: "true"

  deployments:
    - name: "{{ .metadata.name }}-mongoexpress"
      image: "{{ .inputs.mongoExpressImage }}"
      env:
        - name: ME_CONFIG_MONGODB_SERVER
          value: "{{ .metadata.name }}-mongodb"
        - name: ME_CONFIG_MONGODB_PORT
          value: "27017"
        - name: ME_CONFIG_BASICAUTH
          value: "false"
      port: 8081
      resources:
        profile: "{{ .inputs.resourceProfile }}"
      probes:
        liveness:
          type: http
          path: /
          profile: standard
        readiness:
          type: http
          path: /
          profile: standard
      when:
        - field: inputs.enableUI
          equals: "true"

status:
  fields:
    - path: mongodbReady
      value: "{{ AllReplicasReady .children.statefulset }}"
    - path: connectionString
      value: "mongodb://{{ .inputs.username }}@{{ .metadata.name }}-mongodb.{{ .metadata.namespace }}.svc.cluster.local:27017/{{ .inputs.database }}"
    - path: mongoExpressUrl
      value: "http://{{ .metadata.name }}-mongoexpress-svc.{{ .metadata.namespace }}.svc.cluster.local:8081"
