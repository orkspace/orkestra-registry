apiVersion: orkestra.orkspace.io/v1
kind: Motif
metadata:
  name: redis
  version: 0.1.0
  description: >
    Redis StatefulSet with optional persistent storage, headless Service for pod DNS,
    client Service, and Redis Commander management UI. Works with redis:6 through redis:7.
  author: orkspace
  license: Apache-2.0
  tags:
    - redis
    - cache
    - key-value
    - statefulset
    - optional-storage
    - ui
    - headless-service

inputs:
  - name: image
    description: Redis image (e.g. redis:7.2-alpine)
    default: "redis:latest"

  - name: replicas
    description: Number of replicas
    default: "1"

  - name: resourceProfile
    description: CPU/memory profile (small, burst, standard, compute-heavy)
    default: "burst"

  - name: volumeSize
    description: PVC storage size for persistence (omit for pure cache)
    default: "5Gi"

  - name: storageClass
    description: StorageClass for dynamic PVC provisioning
    default: "standard"

  - name: commanderImage
    description: Redis Commander management UI image
    default: "rediscommander/redis-commander:latest"

  - name: enableUI
    description: Deploy the Redis Commander management UI (true/false)
    default: "true"

resources:
  statefulSets:
    - name: "{{ .metadata.name }}-redis"
      image: "{{ .inputs.image }}"
      replicas: "{{ .inputs.replicas }}"
      serviceName: "{{ .metadata.name }}-redis-headless"
      port: 6379
      resources:
        profile: "{{ .inputs.resourceProfile }}"
      probes:
        startup:
          type: tcp
          profile: patient
        liveness:
          type: tcp
          profile: standard
        readiness:
          type: tcp
          profile: standard
      volumeClaimTemplates:
        - name: data
          storageClass: "{{ .inputs.storageClass }}"
          storageSize: "{{ .inputs.volumeSize }}"
          mountPath: /data

  services:
    - name: "{{ .metadata.name }}-redis-headless"
      headless: true
      port: 6379
      targetPort: 6379

    - name: "{{ .metadata.name }}-redis"
      port: 6379
      targetPort: 6379

    - name: "{{ .metadata.name }}-commander-svc"
      port: 8081
      targetPort: 8081
      type: LoadBalancer
      when:
        - field: inputs.enableUI
          equals: "true"

  deployments:
    - name: "{{ .metadata.name }}-commander"
      image: "{{ .inputs.commanderImage }}"
      env:
        REDIS_HOSTS:
          value: "{{ .metadata.name }}-redis:6379"
      port: 8081
      resources:
        profile: "{{ .inputs.resourceProfile }}"
      probes:
        liveness:
          type: http
          path: /
          profile: standard
        readiness:
          type: http
          path: /
          profile: standard
      when:
        - field: inputs.enableUI
          equals: "true"

status:
  fields:
    - path: redisReady
      value: "{{ AllReplicasReady .children.statefulset }}"
    - path: connectionString
      value: "redis://{{ .metadata.name }}-redis.{{ .metadata.namespace }}.svc.cluster.local:6379"
    - path: commanderUrl
      value: "http://{{ .metadata.name }}-commander-svc.{{ .metadata.namespace }}.svc.cluster.local:8081"
