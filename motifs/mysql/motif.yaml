apiVersion: orkestra.orkspace.io/v1
kind: Motif
metadata:
  name: mysql
  version: v8
  description: >
    MySQL StatefulSet with persistent storage, headless Service for pod DNS,
    client Service, and phpMyAdmin management UI.
  author: orkspace
  license: Apache-2.0

inputs:
  - name: image
    description: MySQL image
    default: "mysql:latest"

  - name: replicas
    description: Number of replicas
    default: "1"

  - name: resourceProfile
    description: CPU/memory profile (small, burst, standard, compute-heavy)
    default: "standard"

  - name: volumeSize
    description: PVC storage size for the data volume
    default: "10Gi"

  - name: storageClass
    description: StorageClass for dynamic PVC provisioning
    default: "standard"

  - name: database
    description: Default database name
    default: "app"

  - name: username
    description: MySQL user name
    default: "mysql"

  - name: phpMyAdminImage
    description: phpMyAdmin management UI image
    default: "phpmyadmin:latest"

  - name: enableUI
    description: Deploy the phpMyAdmin management UI (true/false)
    default: "true"

resources:
  statefulSets:
    - name: "{{ .metadata.name }}-mysql"
      image: "{{ .inputs.image }}"
      replicas: "{{ .inputs.replicas }}"
      serviceName: "{{ .metadata.name }}-mysql-headless"
      port: 3306
      resources:
        profile: "{{ .inputs.resourceProfile }}"
      reconcile: true
      probes:
        startup:
          type: tcp
          profile: slow-start
        liveness:
          type: tcp
          profile: standard
        readiness:
          type: tcp
          profile: standard
      volumeClaimTemplates:
        - name: data
          storageClass: "{{ .inputs.storageClass }}"
          storageSize: "{{ .inputs.volumeSize }}"
          mountPath: /var/lib/mysql
      env:
        MYSQL_DATABASE:
          value: "{{ .inputs.database }}"
        MYSQL_USER:
          value: "{{ .inputs.username }}"
        MYSQL_RANDOM_ROOT_PASSWORD:
          value: "yes"

  services:
    - name: "{{ .metadata.name }}-mysql-headless"
      headless: true
      port: 3306
      targetPort: 3306
      reconcile: true

    - name: "{{ .metadata.name }}-mysql"
      port: 3306
      targetPort: 3306
      reconcile: true

    - name: "{{ .metadata.name }}-phpmyadmin-svc"
      port: 80
      targetPort: 80
      type: LoadBalancer
      reconcile: true
      when:
        - field: inputs.enableUI
          equals: "true"

  deployments:
    - name: "{{ .metadata.name }}-phpmyadmin"
      image: "{{ .inputs.phpMyAdminImage }}"
      env:
        PMA_HOST:
          value: "{{ .metadata.name }}-mysql"
        PMA_PORT:
          value: "3306"
      port: 80
      resources:
        profile: "{{ .inputs.resourceProfile }}"
      reconcile: true
      probes:
        liveness:
          type: http
          path: /
          profile: standard
        readiness:
          type: http
          path: /
          profile: standard
      when:
        - field: inputs.enableUI
          equals: "true"

status:
  fields:
    - path: mysqlReady
      value: "{{ AllReplicasReady .children.statefulset }}"
    - path: connectionString
      value: "mysql://{{ .inputs.username }}@{{ .metadata.name }}-mysql.{{ .metadata.namespace }}.svc.cluster.local:3306/{{ .inputs.database }}"
    - path: phpMyAdminUrl
      value: "http://{{ .metadata.name }}-phpmyadmin-svc.{{ .metadata.namespace }}.svc.cluster.local"
