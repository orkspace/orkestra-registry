apiVersion: orkestra.konductor.io/v1Alpha
kind: Katalog
metadata:
  name: postgres-v1
  description: >-
    A declarative PostgreSQL deployment pattern that provisions a single‑instance 
    Postgres server using any CR image version. 
    The pattern accepts any valid Postgres image tag through spec.version, defaults to 14, 
    and exposes port 5432 via a stable Service. 
    It is suitable for development, CI environments, and controlled production setups 
    where teams manage storage, credentials, and high‑availability concerns externally.

spec:
  crds:
    - name: postgres
      apiTypes:
        group: postgres.orkestra.io
        version: v1
        kind: Postgres
        plural: postgreses
      workers: 2
      resync: 1m
      reconciler:
        default: true
        onCreate:
          deployments:
            - image: "postgres:{{ .spec.version | default \"14\" }}"
              replicas: "1"
              reconcile: true
          services:
            - port: "5432"
              targetPort: "5432"
              reconcile: true